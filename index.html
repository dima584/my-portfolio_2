<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RxJS Todo List(D.Nezola)</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 2rem auto; }
    .completed { text-decoration: line-through; color: gray; }
    ul { list-style: none; padding: 0; }
    li { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .filters { margin: 15px 0; }
  </style>
</head>
<body>
  <h1>RxJS Todo Tracker(DimaNezola)</h1>
  
  <div>
    <input type="text" id="todo-input" placeholder="Що потрібно зробити?" />
    <button id="add-btn">Додати</button>
  </div>

  <div class="filters">
    <button class="filter-btn" data-filter="all">Всі</button>
    <button class="filter-btn" data-filter="active">Активні</button>
    <button class="filter-btn" data-filter="completed">Завершені</button>
  </div>

  <ul id="todo-list"></ul>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
